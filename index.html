    <h1 id="title-text">작품 이름</h1>
    <!-- <img src="testImg.png" align="right" width="200" height="200" title="테스트 이미지"></img> -->
    <p id="explan-text">웹 브라우저에서 사용할 수 있는 오디오 파일 형식은 MP3, OGG, WAV와 같이 3가지가 있습니다. 
        익스플로러에서는 MP3 파일 형식만 지원하며, 사파리에서는 MP3와 OGG 파일 형식을 지원합니다.
        파이어폭스와 오페라는 OGG와 WAV 파일 형식을 지원하며  크롬은 MP3, OGG, WAV 모든 파일 형식을 지원합니다.
        웹 문서에서 비디오 파일을 사용할 때 해당 브라우저에서 지원하는 오디오 파일 형식을 확인해야 합니다.
    </p>
    <audio id="sound"  controls >
        <source src="coffee.mp3" type="audio/mp3">
    </audio>
